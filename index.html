<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenTL</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="container" class="container">
    <div id="toolbar" class="toolbar-modern">
    <div class="toolbar-left">
      <div class="add-row-group">
        <button id="addRowBtn" type="button" class="tool-btn" title="Add Row">
          <span class="icon">➕</span>
          <span class="label">Add Row</span>
        </button>
        <div id="addRowMenu" class="add-row-menu" role="menu" aria-hidden="true">
          <input id="menuRowLabel" type="text" placeholder="Row label" class="add-row-input">
          <div class="add-row-color-wrapper">
            <label>Color:</label>
            <input id="menuRowColor" type="color" value="#333333" class="add-row-color">
          </div>
          <button id="confirmRowBtn" type="button" class="add-row-confirm">Create Row</button>
        </div>
      </div>

      <div class="toolbar-separator" aria-hidden="true"></div>

      <div class="add-content-group">
        <button id="addContentBtn" type="button" class="tool-btn" title="Add Content">
          <span class="icon">🧩</span>
          <span class="label">Add Item</span>
        </button>
        <input id="imageInput" type="file" accept="image/*" multiple hidden>
        <div id="addContentMenu" class="add-content-menu" role="menu" aria-hidden="true">
          <div class="add-content-buttons">
            <button id="addImageOptionBtn" type="button" class="add-content-option">
              <span class="icon">🖼️</span>
              <span>Images</span>
            </button>
            <button id="confirmItemBtn" type="button" class="add-content-option">
              <span class="icon">🅰️</span>
              <span>Text</span>
            </button>
          </div>
          <input id="menuItemText" type="text" placeholder="Item text" class="add-content-input">
        </div>
      </div>
    </div>

    <div class="toolbar-right">
      <div class="export-import-group">
        <button id="exportBtn" type="button" class="tool-btn" title="Export"><span class="icon">💾</span><span class="label">Export</span></button>
        <button id="importBtn" type="button" class="tool-btn" title="Import JSON"><span class="icon">📥</span><span class="label">Import</span></button>
        <input id="importInput" type="file" accept="application/json" hidden>
        <div id="exportMenu" class="export-menu" role="menu" aria-hidden="true">
          <button type="button" class="export-option" data-format="jpg">Export as JPG</button>
          <button type="button" class="export-option" data-format="png">Export as PNG</button>
          <button type="button" class="export-option" data-format="pdf">Export as PDF</button>
          <div class="export-menu-divider"></div>
          <button type="button" class="export-option" data-format="json">Export as JSON</button>
        </div>
      </div>
      <div class="toolbar-separator" aria-hidden="true"></div>
      <button id="poolToggleBtn" type="button" class="tool-btn" title="Toggle item pool" aria-expanded="false"><span class="icon">☰</span><span class="label">Pool</span></button>
    </div>
  </div>

  <div id="appBody" class="app-body">
    <div id="tierArea" class="tier-area">
      <!-- rows appended here -->
    </div>

    <div id="itemPoolWrapper" class="item-pool-wrapper collapsed">
      <aside id="itemPool" class="item-pool" aria-label="Item pool">
        <div class="pool-top">
          <div>
            <h2>Item Pool</h2>
            <p>New items load here first before moving them into tiers.</p>
          </div>
        </div>
        <div id="poolContent" class="pool-content" aria-label="Item pool content"></div>
      </aside>
    </div>
  </div>

</div>

  <template id="rowTemplate">
    <div class="row">
      <div class="row-header">
        <div class="row-title">
          <input class="row-label" />
        </div>
        <div class="row-controls">
          <input type="color" class="row-color" aria-label="Row color" />
          <button class="remove-row" title="Remove row" aria-label="Remove row">🗑️</button>
        </div>
      </div>
      <div class="row-dropzone" draggable="false"></div>
    </div>
  </template>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
